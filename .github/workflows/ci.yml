name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Testes (vitest)
        run: npm test
      - name: Calibração de realismo (gate — falha se sair dos alvos)
        run: npm run sim:calibrate
      - name: Auditoria A/B (cada alavanca/over move a métrica certa — sem botão morto)
        run: node src/engine/calibrate.js --ab 2500
